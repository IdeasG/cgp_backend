name: Deploy Backend

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Ejecutar despliegue por SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            # Moverse a la carpeta del proyecto en el servidor
            cd /root/cgp_backend
            
            # Obtener los ultimos cambios de GitHub
            git pull origin main
            
            # Instalar dependencias
            npm install
            
            # Reiniciar la aplicacion con PM2
            pm2 restart cgp-backend || pm2 start app.js --name "cgp-backend"
