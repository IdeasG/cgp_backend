name: Deploy Backend

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Ejecutar despliegue por SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            # Si la carpeta no existe, inicializarla
            if [ ! -d "/root/cgp_backend" ]; then
              mkdir -p /root/cgp_backend
              cd /root/cgp_backend
              git init
            fi
            
            # Moverse a la carpeta del proyecto en el servidor
            cd /root/cgp_backend
            
            # Forzar la URL con un token temporal fresco para que nunca pida contraseña
            git remote remove origin || true
            git remote add origin "https://${{ github.actor }}:${{ github.token }}@github.com/${{ github.repository }}.git"
            
            # Obtener los ultimos cambios de GitHub
            git fetch origin
            git reset --hard origin/main
            
            # Instalar dependencias
            npm install
            
            # CONFIGURAR NGINX Y ENTORNO AUTOMATICAMENTE
            echo "Creando archivo .env en el backend"
            cat << 'EOF' > /root/cgp_backend/.env
            PORT=3044
            DATABASE_URL=postgresql://postgres:mP7%23zX%409qT%21kR4%26vGd2%24hLnF8sWj@84.247.176.139:5432/bdcgp
            JWT_SECRET_KEY=cgp_super_secret_key
            JWT_REFRESH_TOKEN_KEY=cgp_super_refresh_key
            EOF
            
            echo "Creando configuracion Nginx para backend"
            cat << 'EOF' > /etc/nginx/sites-available/cgpb.ideasg.org
            server {
                listen 80;
                server_name cgpb.ideasg.org;
                location / {
                    proxy_pass http://localhost:3044;
                    proxy_http_version 1.1;
                    proxy_set_header Upgrade $http_upgrade;
                    proxy_set_header Connection 'upgrade';
                    proxy_set_header Host $host;
                    proxy_cache_bypass $http_upgrade;
                }
            }
            EOF
            
            echo "Creando configuracion Nginx para frontend"
            cat << 'EOF' > /etc/nginx/sites-available/cgp.ideasg.org
            server {
                listen 80;
                server_name cgp.ideasg.org;
                location / {
                    proxy_pass http://localhost:3045;
                    proxy_http_version 1.1;
                    proxy_set_header Upgrade $http_upgrade;
                    proxy_set_header Connection 'upgrade';
                    proxy_set_header Host $host;
                    proxy_cache_bypass $http_upgrade;
                }
            }
            EOF
            
            echo "Reiniciando Nginx"
            ln -sf /etc/nginx/sites-available/cgpb.ideasg.org /etc/nginx/sites-enabled/
            ln -sf /etc/nginx/sites-available/cgp.ideasg.org /etc/nginx/sites-enabled/
            systemctl restart nginx
            
            # Moverse a la carpeta del proyecto en el servidor
            cd /root/cgp_backend
            
            # Obtener los ultimos cambios de GitHub
            git pull origin main
            
            # Instalar dependencias
            npm install
            
            # Reiniciar la aplicacion con PM2 (Borrando el proceso anterior para asegurar la ruta correcta)
            pm2 delete cgp-backend || true
            pm2 start app.js --name "cgp-backend"
